<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crear cuenta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cuerpo-login">
    <div class="register-container">
        <h1>Regístrate</h1>

        <form action="/api/registrar-admin" method="POST" id="registroFormAdmin">
            <label>Correo Electrónico</label>
            <div class="input-group">
                <i class="fas fa-user"></i> 
                <input type="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <label>Usuario</label>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="nombre" placeholder="Tu usuario" required>
            </div>

            <label>Contraseña</label>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="12345678" required>
            </div>

            <label>Confirmar Contraseña</label>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="12345678" required>
            </div>
                 
            <label>Carnet</label>
            <div class="input-group">
                <i class="fas fa-id-card"></i> 
                <input type="text" placeholder="25-02197-0" required>
            </div>

            <div class="button-container">
                <button type="submit" class="btn-link-style">Registrarse</button>
            </div>
        </form>
    </div>

<script>
  document.getElementById('registroFormAdmin').addEventListener('submit', function(event) {
    event.preventDefault(); 

    const pass = document.getElementById('password').value;
    const confirmPass = document.getElementById('confirmPassword').value;

    if (pass !== confirmPass) {
        alert("¡Las contraseñas no coinciden!");
        return; 
    }

    // CORREGIDO: Ahora sí envía los datos del administrador al backend
    this.submit(); 
});
</script>
</body>
</html>
