<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/tu-kit-id.js" crossorigin="anonymous"></script>
</head>
<body class="cuerpo-login">

<div class="register-container">
    <h1>Regístrate</h1>

    <form action="/api/registrar" method="POST" id="registroForm"> 
        
        <label>Correo Electrónico</label>
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="email" name="email" placeholder="ejemplo@correo.com" required>
        </div>

        <label>Usuario</label>
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="nombre" placeholder="Tu usuario" minlength="3" required>
        </div>

        <label>Contraseña</label>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" minlength="8" required>
        </div>

        <label>Confirmar Contraseña</label>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
        </div>

        <div class="button-container">
            <button type="submit" class="btn-link-style">Registrarse</button>
        </div>
    </form>
</div>

<script>
  document.getElementById('registroForm').addEventListener('submit', function(event) {
    event.preventDefault(); // Pausa momentánea para validar

    const pass = document.getElementById('password').value;
    const confirmPass = document.getElementById('confirmPassword').value;

    if (pass !== confirmPass) {
        alert("¡Las contraseñas no coinciden!");
        return; 
    }

    // CORREGIDO: Ahora sí deja que los datos viajen a Express y MySQL
    this.submit(); 
});
</script>
    
</body>
</html>
