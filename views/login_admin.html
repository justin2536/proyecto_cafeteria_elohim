<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin inicio sesion - registrarse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cuerpo-login">
    <div class="login-box">
        <form action="/api/login-admin" method="POST">
            <label for="usuario">Correo Administrador</label>
            <div class="input-group">
                <i class="fas fa-user"></i> 
                <input type="email" id="usuario" name="email" placeholder="admin@correo.com" required>
            </div>

            <label for="password">Contraseña</label>
            <div class="input-group">
                <i class="fas fa-lock"></i> 
                <input type="password" id="password" name="password" placeholder="12345678" required>
            </div>

            <label for="carnet">Carnet</label>
            <div class="input-group">
                <i class="fas fa-id-card"></i> 
                <input type="text" id="carnet" placeholder="LP-25-0219-L" required>
            </div>

            <button type="submit" class="btn-ingresar">Ingresar</button>

            </h2>
        </form>
    </div>
</body>
</html>
